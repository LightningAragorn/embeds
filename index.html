<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingView Ticker Tape</title>
    <style>
       /* Reset margins and hide scrollbars for a clean Notion embed */
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevents scrollbars from appearing */
            background-color: transparent;
            height: 100vh; /* Locks the body to exactly the height of the Notion block */
        }
        
        /* The container that will do the cropping */
        .widget-container {
            width: 100%;
            height: 100vh; 
            overflow: hidden; /* This is the key: it acts as a mask, cutting off anything outside it */
        }
        
        /* The widget itself */
        tv-market-summary {
            display: block;
            width: 100%;
            /* Make the widget taller than the container to push the footer out of frame */
            /* You may need to tweak the '40px' depending on the exact size of the TradingView footer */
            height: calc(100vh + 40px); 
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-market-summary.js"></script>
        <tv-market-summary symbol-sectors='[{"sectionName":"Stocks","symbols":["NASDAQ:NVDA","NYSE:TSM","NASDAQ:MSFT","NASDAQ:GOOGL"]},{"sectionName":"Crypto","symbols":["BITSTAMP:BTCUSD","BITSTAMP:ETHUSD","CRYPTO:XRPUSD"]},{"sectionName":"Indices","symbols":["FOREXCOM:SPXUSD","FOREXCOM:NSXUSD","FOREXCOM:DJI"]}]' time-frame="7D" show-time-range direction="horizontal" item-size="compact" mode="custom"></tv-market-summary>
    </div>
</body>
</html>
